<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>Pusheen Bank 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <!-- Estrellas decorativas -->
    <div class="stars">
      <span class="star" style="top:8%;left:12%">✦</span>
      <span class="star" style="top:15%;right:18%">✧</span>
      <span class="star" style="top:72%;left:8%">✦</span>
      <span class="star" style="top:80%;right:10%">✧</span>
      <span class="star" style="top:40%;left:5%">⋆</span>
      <span class="star" style="top:55%;right:6%">⋆</span>
    </div>
    <div class="login-logo">
      <!-- Pusheen waving / happy login -->
      <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
           onerror="this.src='assets/img/pusheen.gif'" alt="Pusheen">
    </div>
    <h1 class="login-title">Pusheen Bank</h1>
    <p class="login-sub">¿Quién eres hoy? 🐾</p>
    <div class="profile-grid">
      <button id="franco-btn" class="profile-btn">
        <span class="profile-avatar">🧔</span>
        <span class="profile-name">Franco</span>
        <span class="profile-tag">Jefe 💼</span>
      </button>
      <button id="jess-btn" class="profile-btn">
        <span class="profile-avatar">👩</span>
        <span class="profile-name">Jess</span>
        <span class="profile-tag">Jefa 👑</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== JUEGO ===== -->
<div id="game-screen" class="screen">

  <!-- Header -->
  <header class="app-header">
    <div class="header-player">
      <span id="player-avatar">🐾</span>
      <span id="player-name">—</span>
    </div>
    <div class="header-wallet">
      <span class="wallet-label">Tu billetera</span>
      <span class="wallet-amount"><span id="available-coins">0</span> 🪙</span>
    </div>
    <div class="header-actions">
      <button id="notif-btn" class="btn-icon" title="Notificaciones">
        🔔
        <span id="notif-badge" class="notif-badge" style="display:none;">0</span>
      </button>
      <button id="logout-btn" class="btn-icon" title="Salir">↩</button>
    </div>
  </header>

  <!-- Pusheen + banco -->
  <section class="pusheen-section">
    <div class="bank-bubble">
      <span class="bank-num" id="coin-count">0</span>
      <span class="bank-label">monedas de Pusheen</span>
    </div>
    <div class="pusheen-wrap">
      <!-- GIF principal - Pusheen idle/happy -->
      <img id="pusheen-main-img"
           src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
           onerror="this.src='assets/img/pusheen.gif'"
           class="pusheen-main" alt="Pusheen">
      <!-- Partículas de monedas al dar -->
      <div id="coin-particles" class="coin-particles"></div>
    </div>
  </section>

  <!-- Controles -->
  <section class="controls-section">
    <div class="quick-btns">
      <button class="quick-btn give" onclick="handleCoin('add',1)">+1 🪙</button>
      <button class="quick-btn give" onclick="handleCoin('add',5)">+5 🪙</button>
      <button class="quick-btn steal" onclick="handleCoin('remove',1)">-1 ❌</button>
      <button class="quick-btn steal" onclick="handleCoin('remove',5)">-5 ❌</button>
    </div>
    <div class="custom-row">
      <input type="number" id="custom-val" placeholder="Cantidad..." min="1">
      <button class="btn-give" onclick="handleCustom('add')">Dar 🪙</button>
      <button class="btn-steal" onclick="handleCustom('remove')">Robar ❌</button>
    </div>
    <div id="action-message" class="action-message" style="display:none;"></div>
  </section>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="ranking">🏆 Ranking</button>
    <button class="tab" data-tab="history">📜 Historial</button>
    <button class="tab" data-tab="complaints">🚨 Denuncias</button>
  </div>

  <!-- TAB RANKING -->
  <section id="tab-ranking" class="tab-content active">
    <div class="tab-header-img">
      <!-- Pusheen con trofeo -->
      <img src="https://media.giphy.com/media/l0K4mbH4lKBhAPFU4/giphy.gif"
           onerror="this.src='assets/img/pusheen.gif'"
           class="tab-gif" alt="Pusheen ranking">
      <p class="tab-gif-label">¡A ganar! 👑</p>
    </div>
    <div id="ranking-list" class="ranking-list"></div>
  </section>

  <!-- TAB HISTORIAL -->
  <section id="tab-history" class="tab-content">
    <div id="history" class="history-list"></div>
  </section>

  <!-- TAB DENUNCIAS -->
  <section id="tab-complaints" class="tab-content">

    <div class="tab-header-img">
      <!-- Pusheen enojada/asustada -->
      <img src="https://media.giphy.com/media/H7kfFDvD9HSYGRbvid/giphy.gif"
           onerror="this.src='assets/img/pusheen.gif'"
           class="tab-gif" alt="Pusheen denuncia">
      <p class="tab-gif-label">¡Justicia! 🚨</p>
    </div>

    <button class="btn-new-complaint" id="btn-new-complaint">+ Nueva denuncia 🚨</button>

    <div id="complaint-form" class="complaint-form" style="display:none;">
      <h3 class="form-title">📋 Nueva Denuncia</h3>

      <label class="form-label">Categoría</label>
      <select id="c-category" class="form-select">
        <option value="">Selecciona una categoría...</option>
        <option value="No me hizo caso">😤 No me hizo caso</option>
        <option value="Robó monedas">🪙 Robó monedas</option>
        <option value="Actitud fea">😒 Actitud fea</option>
        <option value="Me ignoró">📵 Me ignoró</option>
        <option value="Otro">📝 Otro</option>
      </select>

      <label class="form-label">¿Qué pasó?</label>
      <textarea id="c-description" class="form-textarea" placeholder="Describe lo que pasó con todos los detalles..."></textarea>

      <label class="form-label">Nivel de gravedad</label>
      <div class="severity-btns">
        <button type="button" class="severity-btn" data-val="leve">😐 Leve</button>
        <button type="button" class="severity-btn" data-val="grave">😠 Grave</button>
        <button type="button" class="severity-btn" data-val="catastrofico">💀 Catastrófico</button>
      </div>
      <input type="hidden" id="c-severity" value="">

      <label class="form-label">Evidencia (foto opcional)</label>
      <input type="file" id="c-image" class="form-file" accept="image/*">

      <div id="complaint-msg" class="action-message" style="display:none;"></div>

      <div class="form-actions">
        <button id="btn-cancel-complaint" class="btn-cancel">Cancelar</button>
        <button id="btn-submit-complaint" class="btn-submit">Enviar denuncia 🚨</button>
      </div>
    </div>

    <div id="complaints-list" class="complaints-list"></div>
  </section>

</div>

<!-- ===== PANEL NOTIFICACIONES ===== -->
<div id="notif-panel" class="notif-panel" style="display:none;">
  <div class="notif-header">
    <span>Notificaciones 🔔</span>
    <button id="notif-close" class="btn-icon">✕</button>
  </div>
  <div id="notif-list" class="notif-list"></div>
</div>
<div id="notif-overlay" class="notif-overlay" style="display:none;"></div>

<!-- ===== TOAST DE REACCIÓN (GIF overlay) ===== -->
<div id="reaction-toast" class="reaction-toast" style="display:none;">
  <img id="reaction-gif" src="" alt="">
  <p id="reaction-text"></p>
</div>

<script type="module" src="assets/js/main.js"></script>
<script>
  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // Severity buttons
  document.querySelectorAll('.severity-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.severity-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('c-severity').value = btn.dataset.val;
    });
  });

  // Toggle formulario
  document.getElementById('btn-new-complaint').onclick = () => {
    document.getElementById('complaint-form').style.display = 'block';
    document.getElementById('btn-new-complaint').style.display = 'none';
    document.getElementById('complaint-form').scrollIntoView({ behavior: 'smooth' });
  };
  document.getElementById('btn-cancel-complaint').onclick = () => {
    document.getElementById('complaint-form').style.display = 'none';
    document.getElementById('btn-new-complaint').style.display = 'block';
  };

  // Notificaciones panel
  document.getElementById('notif-btn').onclick = () => {
    document.getElementById('notif-panel').style.display = 'flex';
    document.getElementById('notif-overlay').style.display = 'block';
    if (window.markNotifsSeen) window.markNotifsSeen();
  };
  document.getElementById('notif-close').onclick = closeNotifPanel;
  document.getElementById('notif-overlay').onclick = closeNotifPanel;
  function closeNotifPanel() {
    document.getElementById('notif-panel').style.display = 'none';
    document.getElementById('notif-overlay').style.display = 'none';
  }

  // Partículas de monedas
  window.spawnCoins = function(count = 6) {
    const container = document.getElementById('coin-particles');
    for (let i = 0; i < count; i++) {
      const coin = document.createElement('span');
      coin.textContent = '🪙';
      coin.className = 'coin-particle';
      coin.style.left = (30 + Math.random() * 40) + '%';
      coin.style.animationDelay = (Math.random() * 0.4) + 's';
      coin.style.fontSize = (14 + Math.random() * 10) + 'px';
      container.appendChild(coin);
      setTimeout(() => coin.remove(), 1200);
    }
  };

  // Reacción con GIF al dar/robar
  window.showReaction = function(action) {
    const toast = document.getElementById('reaction-toast');
    const gif = document.getElementById('reaction-gif');
    const text = document.getElementById('reaction-text');

    if (action === 'add') {
      // Pusheen happy / celebrando
      gif.src = 'https://media.giphy.com/media/3o7TKSjRrfIPjeiVyM/giphy.gif';
      text.textContent = '¡Gracias! 🪙✨';
    } else {
      // Pusheen triste / enojada
      gif.src = 'https://media.giphy.com/media/xT5LMAvRY92qUXj7dC/giphy.gif';
      text.textContent = '¡Me robaron! 😾';
    }

    toast.style.display = 'flex';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.style.display = 'none'; }, 2500);
  };
</script>
</body>
</html>
